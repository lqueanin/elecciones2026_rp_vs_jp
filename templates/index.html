<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brecha Electoral: RP vs JPP</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; color: #333; text-align: center; padding: 20px; }
        .dashboard { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .candidatos { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .tarjeta { padding: 15px; border-radius: 8px; width: 45%; background: #e9ecef; }
        .tarjeta h3 { margin: 0 0 10px 0; font-size: 1.1em; color: #495057; }
        .votos { font-size: 1.8em; font-weight: bold; color: #0056b3; }
        .brecha-container { margin: 20px 0; padding: 15px; background: #fff3cd; border-radius: 8px; border: 1px solid #ffe69c; }
        .brecha-valor { font-size: 2em; font-weight: bold; color: #b30000; }
        canvas { max-width: 100%; margin-top: 20px; }
        .status { font-size: 0.8em; color: #6c757d; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h2>Evolución de Brecha Electoral</h2>
    
    <div class="candidatos">
        <div class="tarjeta">
            <h3>RENOVACIÓN POPULAR</h3>
            <div class="votos" id="votos-rp">...</div>
        </div>
        <div class="tarjeta">
            <h3>JUNTOS POR EL PERÚ</h3>
            <div class="votos" id="votos-jpp">...</div>
        </div>
    </div>

    <div class="brecha-container">
        <div>Diferencia actual:</div>
        <div class="brecha-valor" id="diferencia-votos">0 votos</div>
    </div>

    <canvas id="graficoBrecha"></canvas>
    <div class="status" id="status-update">Actualizando datos...</div>
</div>

<script>
    let chartBrecha;

    // Función para dibujar la gráfica
    function renderizarGrafico(etiquetas, datos) {
        const ctx = document.getElementById('graficoBrecha').getContext('2d');
        if (chartBrecha) {
            chartBrecha.destroy();
        }
        chartBrecha = new Chart(ctx, {
            type: 'line',
            data: {
                labels: etiquetas,
                datasets: [{
                    label: 'Diferencia de Votos (Brecha)',
                    data: datos,
                    borderColor: '#dc3545',
                    backgroundColor: 'rgba(220, 53, 69, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.2
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: false } },
                animation: false
            }
        });
    }

    // Función principal: Scraping desde el cliente + Guardado en DB
    async function cargarDatos() {
        const ONPE_URL = 'https://resultadoelectoral.onpe.gob.pe/presentacion-backend/resumen-general/participantes?idEleccion=10&tipoFiltro=eleccion';
        
        // Lista de proxies para rotar si uno falla
        const PROXIES = [
            'https://api.allorigins.win/get?url=',
            'https://corsproxy.io/?',
            'https://thingproxy.freeboard.io/fetch/'
        ];
    
        let onpeData = null;
    
        // Intentamos con cada proxy hasta que uno funcione
        for (let proxy of PROXIES) {
            try {
                console.log("Intentando con proxy:", proxy);
                const res = await fetch(proxy + encodeURIComponent(ONPE_URL));
                
                if (proxy.includes('allorigins')) {
                    const json = await res.json();
                    onpeData = JSON.parse(json.contents);
                } else {
                    onpeData = await res.json();
                }
    
                if (onpeData && onpeData.success) {
                    console.log("¡Éxito con!", proxy);
                    break; // Si funcionó, salimos del bucle
                }
            } catch (e) {
                console.warn("Falló el proxy " + proxy + ", intentando el siguiente...");
            }
        }
    
        // Si logramos obtener datos, los "empujamos" a Railway
        if (onpeData && onpeData.success) {
            const rp = onpeData.data.find(p => p.codigoAgrupacionPolitica == 35);
            const jpp = onpeData.data.find(p => p.codigoAgrupacionPolitica == 10);
    
            await fetch('/api/push-votos?token=unjbg_esis_2026', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    votos_rp: rp.totalVotosValidos,
                    votos_jpp: jpp.totalVotosValidos
                })
            });
        }
    
        // Finalmente, cargamos el historial de la DB para mostrar la gráfica
        const resDB = await fetch('/api/historial');
        const historial = await resDB.json();
        
        if (historial.length > 0) {
            const ultimo = historial[historial.length - 1];
            document.getElementById('votos-rp').innerText = ultimo.votos_rp.toLocaleString('es-PE');
            document.getElementById('votos-jpp').innerText = ultimo.votos_jpp.toLocaleString('es-PE');
            document.getElementById('diferencia-votos').innerText = ultimo.diferencia.toLocaleString('es-PE') + " votos";
    
            const etiquetas = historial.map(h => h.fecha);
            const datos = historial.map(h => h.diferencia);
            renderizarGrafico(etiquetas, datos);
        }
    }

    // Al cargar la página y cada 5 minutos
    window.onload = () => {
        cargarDatos();
        setInterval(cargarDatos, 5 * 60 * 1000); 
    };
</script>

</body>
</html>
